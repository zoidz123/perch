name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, tests, package, and iOS
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Detect iOS changes
        id: changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if git diff --quiet "$BASE_SHA" "$HEAD_SHA" -- apps/ios; then
            echo "ios=false" >> "$GITHUB_OUTPUT"
          else
            echo "ios=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:public-seed
      - run: npm run build
      - name: Run core server tests
        run: >-
          node --import tsx --test
          apps/server/src/stateDb.test.ts
          apps/server/src/completionLifecycle.e2e.test.ts
          apps/server/src/reliabilityE2e.test.ts
      - run: npm run test:package
      - name: Compile iOS app with Xcode 26
        if: steps.changes.outputs.ios == 'true'
        run: >-
          xcodebuild
          -project apps/ios/Perch.xcodeproj
          -scheme Perch
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "$RUNNER_TEMP/PerchDerivedData"
          build
