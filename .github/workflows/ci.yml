name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, tests, package, and iOS
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run check:public-seed
      - run: npm run build
      - name: Run core server tests
        run: >-
          node --import tsx --test
          apps/server/src/stateDb.test.ts
          apps/server/src/completionLifecycle.e2e.test.ts
          apps/server/src/reliabilityE2e.test.ts
      - run: npm run test:package
      - name: Compile iOS app with Xcode 26
        run: >-
          xcodebuild
          -project apps/ios/Perch.xcodeproj
          -scheme Perch
          -destination 'platform=iOS Simulator,name=iPhone 17 Pro'
          -derivedDataPath "$RUNNER_TEMP/PerchDerivedData"
          build
